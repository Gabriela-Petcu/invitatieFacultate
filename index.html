<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Someră cu diplomă</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #f7d046, #f08cfa);
  color: #222;
  text-align: center;
}

.container {
  padding: 80px 20px;
}

h1 {
  font-size: 40px;
}

button {
  padding: 15px 25px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin: 10px;
  transition: 0.3s;
}

.reveal-btn {
  background: black;
  color: white;
}

.reveal-btn:hover {
  transform: scale(1.1);
}

.reason {
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.6s ease;
  margin: 15px 0;
  font-size: 18px;
}

.reason.show {
  opacity: 1;
  transform: translateY(0);
}

.yes {
  background: #2ecc71;
  color: white;
}

.no {
  background: #e74c3c;
  color: white;
  position: relative;
}
</style>
</head>

<body>

<div class="container">
  <h1>Pe data X devin oficial șomeră 🎓</h1>
  <p>Absolvire – sezonul final ✨</p>

  <button class="reveal-btn" onclick="revealReasons()">Află motivele serioase</button>

  <div id="reasons">
    <div class="reason">• îți sunt dragă 😌</div>
    <div class="reason">• m-ai auzit 3 ani cum m-am plâns</div>
    <div class="reason">• ultima ta șansă să mă vezi cu robă și tocă</div>
    <div class="reason">• te cazez + mâncare incluse</div>
    <div class="reason">• îți fac și cinste cu o matcha ☕💚</div>
  </div>

  <br><br>

  <button class="yes" onclick="window.location.href='LINK_GOOGLE_FORM'">
    Evident că vin
  </button>

  <button class="no" onmouseover="moveButton(this)">
    Nu pot
  </button>
</div>

<script>
function revealReasons() {
  const reasons = document.querySelectorAll('.reason');
  reasons.forEach((reason, index) => {
    setTimeout(() => {
      reason.classList.add('show');
    }, index * 600);
  });
}

function moveButton(btn) {
  btn.style.left = Math.random() * 200 - 100 + 'px';
  btn.style.top = Math.random() * 50 - 25 + 'px';
}
</script>

</body>
</html>
